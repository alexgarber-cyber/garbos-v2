<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      width: 320px;
      color: #1a1a1a;
      background: #fff;
    }

    header {
      background: #0a66c2;
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    header span { opacity: 0.85; font-size: 12px; font-weight: 400; }

    .section { padding: 12px 14px; border-bottom: 1px solid #e8e8e8; }
    .section:last-child { border-bottom: none; }

    /* Settings */
    .settings-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .field-row { margin-bottom: 8px; }
    .field-row label { display: block; font-size: 11px; color: #555; margin-bottom: 3px; }
    .field-row input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
    }
    .field-row input:focus { outline: none; border-color: #0a66c2; }
    .btn-save {
      background: #0a66c2;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 2px;
    }
    .btn-save:hover { background: #004182; }
    .token-hint { font-size: 11px; color: #888; margin-top: 6px; }
    .settings-toggle {
      font-size: 11px;
      color: #0a66c2;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      padding: 0;
    }

    /* Profile fields */
    .profile-field { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
    .profile-field .label { color: #888; min-width: 64px; font-size: 11px; padding-top: 1px; }
    .profile-field .value { color: #1a1a1a; flex: 1; word-break: break-word; }
    .profile-field .value a { color: #0a66c2; text-decoration: none; }
    .profile-field .value a:hover { text-decoration: underline; }

    /* Duplicate warning */
    .warning {
      background: #fff8e6;
      border: 1px solid #f0c040;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 12px;
      color: #7a5c00;
      margin-bottom: 10px;
    }
    .warning strong { display: block; margin-bottom: 2px; }

    /* Action buttons */
    .actions { display: flex; gap: 8px; padding-top: 2px; }
    .btn-primary {
      flex: 1;
      background: #0a66c2;
      color: #fff;
      border: none;
      padding: 8px 0;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover:not(:disabled) { background: #004182; }
    .btn-secondary {
      flex: 1;
      background: #fff;
      color: #0a66c2;
      border: 1.5px solid #0a66c2;
      padding: 8px 0;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-secondary:hover:not(:disabled) { background: #e8f0fb; }
    .btn-primary:disabled, .btn-secondary:disabled { opacity: 0.5; cursor: default; }

    /* Result */
    .result-ok { color: #1a7a3e; font-weight: 600; text-align: center; padding: 4px 0; }
    .result-err { color: #b91c1c; font-size: 12px; text-align: center; padding: 4px 0; }

    /* Notice */
    .notice { color: #666; font-size: 12px; text-align: center; padding: 8px 0; }

    /* Loading */
    .loading { color: #888; font-size: 12px; text-align: center; padding: 8px 0; }
  </style>
</head>
<body>

<header>
  GarbOS
  <span>LinkedIn Importer</span>
</header>

<!-- Settings panel (shown when no token, or toggled) -->
<div class="section" id="settings-panel" style="display:none">
  <div class="settings-label">Settings</div>
  <div class="field-row">
    <label>GarbOS API URL</label>
    <input type="text" id="input-api-url" placeholder="https://garbos.io/api" />
  </div>
  <div class="field-row">
    <label>Personal API Token</label>
    <input type="password" id="input-token" placeholder="Paste token here" />
  </div>
  <button class="btn-save" id="btn-save-settings">Save</button>
  <div class="token-hint">
    Generate a token in GarbOS: Settings → API Token → Generate.
  </div>
</div>

<!-- Main content (hidden while settings shown) -->
<div id="main-content">
  <div class="section" id="settings-bar" style="display:none">
    <button class="settings-toggle" id="btn-open-settings">⚙ API Settings</button>
  </div>

  <div class="section" id="profile-section" style="display:none">
    <div class="profile-field"><span class="label">Name</span><span class="value" id="f-name">—</span></div>
    <div class="profile-field"><span class="label">Title</span><span class="value" id="f-title">—</span></div>
    <div class="profile-field"><span class="label">Company</span><span class="value" id="f-company">—</span></div>
    <div class="profile-field"><span class="label">Location</span><span class="value" id="f-location">—</span></div>
    <div class="profile-field"><span class="label">LinkedIn</span><span class="value" id="f-url">—</span></div>
  </div>

  <div class="section" id="action-section" style="display:none">
    <div id="duplicate-warning" class="warning" style="display:none">
      <strong id="dup-title"></strong>
      <span id="dup-detail"></span>
    </div>
    <div class="actions">
      <button class="btn-primary" id="btn-prospect">Add as Prospect</button>
      <button class="btn-secondary" id="btn-contact">Add as Contact</button>
    </div>
    <div id="result" style="margin-top: 8px;"></div>
  </div>

  <div class="section" id="notice-section" style="display:none">
    <div class="notice" id="notice-text"></div>
  </div>

  <div class="section" id="loading-section">
    <div class="loading">Loading…</div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
