services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-garbos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garbos}
      POSTGRES_DB: ${POSTGRES_DB:-garbos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    env_file: .env
    environment:
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - /app/.venv          # keep the container's uv venv, don't shadow with host
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # One-shot migration runner. Run explicitly AFTER reviewing the migration:
  #   docker compose run --rm migrate
  migrate:
    build: ./api
    env_file: .env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    profiles: ["tools"]

  web:
    build: ./web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      API_BASE_URL_INTERNAL: ${API_BASE_URL_INTERNAL:-http://api:8000}
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules   # container's installed deps survive the bind mount
      - /app/.next          # build cache stays in the container
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

volumes:
  db_data:
